<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie Learning Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>EduGenie Learning Assistant</h1>
    <p>Your AI-powered learning assistant</p>

    <!-- QnA -->
    <h2>Question Answering</h2>
    <form id="qaForm">
        <input type="text" id="question" placeholder="Why is the sky blue?" required>
        <button type="submit">Get Answer</button>
    </form>
    <div id="qaResult" class="output"></div>

    <!-- Explanation -->
    <h2>Concept Explanation</h2>
    <form id="explainForm">
        <input type="text" id="topic" placeholder="Photosynthesis" required>
        <button type="submit">Explain</button>
    </form>
    <div id="explainResult" class="output"></div>

    <!-- Summary -->
    <h2>Summarization</h2>
    <form id="summaryForm">
        <textarea id="summaryText" placeholder="Paste text here..." required></textarea>
        <button type="submit">Summarize</button>
    </form>
    <div id="summaryResult" class="output"></div>

    <!-- Quiz -->
    <h2>Quiz Generation</h2>
    <form id="quizForm">
        <textarea id="quizText" placeholder="Enter study material..." required></textarea>
        <button type="submit">Generate Quiz</button>
    </form>
    <div id="quizResult" class="output"></div>

    <!-- Learning Path -->
    <h2>Learning Path</h2>
    <form id="learningForm">
        <input type="text" id="learningTopic" placeholder="Python" required>
        <button type="submit">Generate Learning Path</button>
    </form>
    <div id="learningResult" class="output"></div>

</div>

<script>
document.getElementById("qaForm").onsubmit = async (e)=>{
    e.preventDefault();
    const q=document.getElementById("question").value;
    const res=await fetch(`/qa?question=${encodeURIComponent(q)}`);
    const data=await res.json();
    document.getElementById("qaResult").innerText=data.answer;
};

document.getElementById("explainForm").onsubmit = async (e)=>{
    e.preventDefault();
    const topic=document.getElementById("topic").value;
    const res=await fetch("/explain",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({topic})
    });
    const data=await res.json();
    document.getElementById("explainResult").innerText=data.explanation;
};

document.getElementById("summaryForm").onsubmit = async (e)=>{
    e.preventDefault();
    const text=document.getElementById("summaryText").value;
    const res=await fetch("/summarize",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });
    const data=await res.json();
    document.getElementById("summaryResult").innerText=data.summary;
};

document.getElementById("quizForm").onsubmit = async (e)=>{
    e.preventDefault();
    const text=document.getElementById("quizText").value;
    const res=await fetch("/quiz",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });
    const data=await res.json();
    document.getElementById("quizResult").innerText=JSON.stringify(data.quiz,null,2);
};

document.getElementById("learningForm").onsubmit = async (e)=>{
    e.preventDefault();
    const topic=document.getElementById("learningTopic").value;
    const res=await fetch(`/learn/recommendations?topic=${encodeURIComponent(topic)}`);
    const data=await res.json();
    document.getElementById("learningResult").innerText=data.recommendation;
};
</script>

</body>
</html>
